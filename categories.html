<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - SIV NIGHTWEARS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
</head>

<body>
<header class="site-header">
    <div class="top-bar">
        <span><i class="fa-solid fa-truck-fast"></i> Free shipping on orders above $50</span>
        <span><i class="fa-solid fa-rotate-left"></i> 30-Day Easy Returns</span>
        <span><i class="fa-solid fa-phone"></i> +91 9840662383</span>
    </div>
    <nav class="main-nav">
        <a href="index.html" class="nav-brand">
            <i class="fa-solid fa-moon"></i> SIV NIGHTWEARS
        </a>
        <div class="nav-search-bar">
            <input type="text" placeholder="Search nightwear, kids, women..." disabled>
            <button class="search-submit-btn" onclick="location.href='index.html'">
                <i class="fa-solid fa-magnifying-glass"></i> Search
            </button>
        </div>
        <div class="nav-actions">
            <button class="nav-icon-btn search-toggle-btn" id="searchToggle" title="Search"
                onclick="location.href='index.html'">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </button>
            <a href="index.html" class="nav-icon-btn">
                <i class="fa-solid fa-house"></i>
                <span>Shop</span>
            </a>
            <a href="about.html" class="nav-icon-btn">
                <i class="fa-solid fa-circle-info"></i>
                <span>About</span>
            </a>
            <a href="categories.html" class="nav-icon-btn" style="color:#FF1493;">
                <i class="fa-solid fa-list"></i>
                <span>Categories</span>
            </a>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>
    <div class="mobile-menu" id="nav-menu">
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="categories.html"><i class="fa-solid fa-list"></i> Categories</a></li>
            <li><a href="about.html"><i class="fa-solid fa-circle-info"></i> About Us</a></li>
        </ul>
    </div>
</header>

    <div class="categories-container">
        <h1>Select Category</h1>
        
        <div class="categories-grid">
            <div class="category-card" onclick="selectCategory('kids')">
                <i class="fa-solid fa-child"></i>
                <h2>Kids</h2>
                <p>Explore our collection for children</p>
                <button class="category-select-btn">View Kids Collection</button>
            </div>
            
            <div class="category-card" onclick="selectCategory('women')">
                <i class="fa-solid fa-person-dress"></i>
                <h2>Women</h2>
                <p>Explore our collection for women</p>
                <button class="category-select-btn">View Women Collection</button>
            </div>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('open');
            hamburger.classList.toggle('active');
        });

        function selectCategory(category) {
            alert('You selected: ' + category.charAt(0).toUpperCase() + category.slice(1));
            // You can add more functionality here, like redirecting to category pages
        }
    </script>
</body>

</html>
